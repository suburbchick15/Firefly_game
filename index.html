<!DOCTYPE html>
<html>
<head>
  <title>Harmony Hollow Firefly Patience Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
      background: linear-gradient(#101936, #203b2b, #315234);
      color: white;
      text-align: center;
      touch-action: manipulation;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      margin-top: 15px;
      font-size: 30px;
      color: #ffeaa7;
      text-shadow: 0 0 8px #000;
    }

    #instructions, #score, #timer, #message, #levelText {
      font-size: 19px;
      margin: 6px;
      text-shadow: 0 0 5px #000;
    }

    button {
      margin: 6px;
      padding: 12px 20px;
      font-size: 18px;
      border-radius: 22px;
      border: none;
      background: #ffe98a;
      color: #3b2b12;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,.3);
    }

    .levelBtn {
      background: #f6d47b;
    }

    .firefly {
      position: absolute;
      width: 46px;
      height: 46px;
      cursor: pointer;
    }

    .body {
      position: absolute;
      left: 15px;
      top: 16px;
      width: 16px;
      height: 22px;
      background: #6b4a2b;
      border-radius: 50%;
      z-index: 2;
    }

    .head {
      position: absolute;
      left: 17px;
      top: 8px;
      width: 13px;
      height: 13px;
      background: #8b5e35;
      border-radius: 50%;
      z-index: 3;
    }

    .eye {
      position: absolute;
      top: 4px;
      width: 2.5px;
      height: 2.5px;
      background: #2b1a10;
      border-radius: 50%;
    }

    .leftEye {
      left: 3px;
    }

    .rightEye {
      right: 3px;
    }

    .smile {
      position: absolute;
      left: 4px;
      top: 7px;
      width: 5px;
      height: 3px;
      border-bottom: 1.5px solid #2b1a10;
      border-radius: 50%;
    }

    .wing {
      position: absolute;
      width: 18px;
      height: 24px;
      background: rgba(230, 245, 255, 0.75);
      border-radius: 50%;
      top: 10px;
      z-index: 1;
    }

    .wing.left {
      left: 4px;
      transform: rotate(-25deg);
    }

    .wing.right {
      right: 4px;
      transform: rotate(25deg);
    }

    .glow {
      position: absolute;
      left: 7px;
      top: 20px;
      width: 32px;
      height: 32px;
      background: radial-gradient(circle, #fff8aa, #ffe96e, transparent);
      border-radius: 50%;
      opacity: 0.25;
      box-shadow: 0 0 8px #ffe96e;
      transition: all 0.35s;
    }

    .ready .glow {
      opacity: 1;
      transform: scale(1.6);
      box-shadow: 0 0 35px #fff6a8;
    }

    .ready {
      animation: gentlePulse 0.9s infinite alternate;
    }

    @keyframes gentlePulse {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    #prize, #quote {
      font-size: 22px;
      margin-top: 10px;
      color: #ffe98a;
      font-weight: bold;
      text-shadow: 0 0 6px #000;
      padding: 0 18px;
    }

    #leaderboard {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.35);
      padding: 10px 18px;
      border-radius: 18px;
      font-size: 16px;
      max-width: 90%;
    }
  </style>
</head>

<body>
  <div id="game">
    <h1>Harmony Hollow Firefly Glow Game</h1>

    <div id="instructions">Choose a level. Then wait for each firefly to glow bright before tapping!</div>

    <div id="levelSelect">
      <button class="levelBtn" onclick="chooseLevel('easy')">Easy</button>
      <button class="levelBtn" onclick="chooseLevel('medium')">Medium</button>
      <button class="levelBtn" onclick="chooseLevel('hard')">Hard</button>
    </div>

    <div id="levelText">Level: Easy</div>
    <div id="timer">Time: 45</div>
    <div id="score">Fireflies: 0</div>

    <button id="startBtn">Start Game</button>

    <div id="message">Barnaby says: “Patience helps us notice the right moment.”</div>
    <div id="prize"></div>
    <div id="quote"></div>
    <div id="leaderboard"></div>
  </div>

  <script>
    const game = document.getElementById("game");
    const scoreDisplay = document.getElementById("score");
    const timerDisplay = document.getElementById("timer");
    const startBtn = document.getElementById("startBtn");
    const message = document.getElementById("message");
    const prizeDisplay = document.getElementById("prize");
    const quoteDisplay = document.getElementById("quote");
    const levelText = document.getElementById("levelText");
    const leaderboard = document.getElementById("leaderboard");

    let score = 0;
    let timeLeft = 45;
    let gameRunning = false;
    let timer;
    let spawnTimer;
    let audioStarted = false;
    let audioCtx;
    let musicTimer;

    let currentLevel = "easy";

    const levels = {
      easy: {
        label: "Easy",
        time: 45,
        spawnSpeed: 1700,
        minWait: 800,
        maxWait: 1400,
        glowWindow: 3300,
        earlyTapRemoves: false
      },
      medium: {
        label: "Medium",
        time: 40,
        spawnSpeed: 1300,
        minWait: 700,
        maxWait: 1200,
        glowWindow: 2300,
        earlyTapRemoves: true
      },
      hard: {
        label: "Hard",
        time: 35,
        spawnSpeed: 950,
        minWait: 550,
        maxWait: 950,
        glowWindow: 1500,
        earlyTapRemoves: true
      }
    };

    startBtn.onclick = startGame;

    function chooseLevel(level) {
      if (gameRunning) return;

      currentLevel = level;
      const settings = levels[currentLevel];

      timeLeft = settings.time;
      levelText.textContent = "Level: " + settings.label;
      timerDisplay.textContent = "Time: " + settings.time;
      message.textContent = "Barnaby says: “Choose your moment with patience.”";
      prizeDisplay.textContent = "";
      quoteDisplay.textContent = "";
    }

    function startGame() {
      score = 0;
      const settings = levels[currentLevel];
      timeLeft = settings.time;
      gameRunning = true;

      prizeDisplay.textContent = "";
      quoteDisplay.textContent = "";
      scoreDisplay.textContent = "Fireflies: 0";
      timerDisplay.textContent = "Time: " + timeLeft;
      message.textContent = "Wait... watch... tap when the glow is bright!";
      startBtn.style.display = "none";

      startGentleMusic();

      timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = "Time: " + timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      spawnTimer = setInterval(createFirefly, settings.spawnSpeed);
    }

    function createFirefly() {
      if (!gameRunning) return;

      const settings = levels[currentLevel];

      const firefly = document.createElement("div");
      firefly.className = "firefly";

      firefly.innerHTML = `
        <div class="glow"></div>
        <div class="wing left"></div>
        <div class="wing right"></div>
        <div class="body"></div>
        <div class="head">
          <div class="eye leftEye"></div>
          <div class="eye rightEye"></div>
          <div class="smile"></div>
        </div>
      `;

      const x = Math.random() * (window.innerWidth - 70);
      const y = 160 + Math.random() * (window.innerHeight - 260);

      firefly.style.left = x + "px";
      firefly.style.top = y + "px";

      let ready = false;

      game.appendChild(firefly);

      const waitTime = settings.minWait + Math.random() * (settings.maxWait - settings.minWait);

      setTimeout(() => {
        if (!gameRunning || !firefly.parentNode) return;
        ready = true;
        firefly.classList.add("ready");
      }, waitTime);

      firefly.onclick = () => {
        if (!gameRunning) return;

        if (ready) {
          score++;
          scoreDisplay.textContent = "Fireflies: " + score;
          message.textContent = getPraise();
          playDing();
          firefly.remove();
        } else {
          message.textContent = "Oops! That firefly wasn't glowing yet. Try waiting patiently.";
          playSoftOops();

          if (settings.earlyTapRemoves) {
            firefly.remove();
          }
        }
      };

      setTimeout(() => {
        if (firefly.parentNode) firefly.remove();
      }, waitTime + settings.glowWindow);
    }

    function endGame() {
      gameRunning = false;
      clearInterval(timer);
      clearInterval(spawnTimer);

      document.querySelectorAll(".firefly").forEach(f => f.remove());

      startBtn.style.display = "inline-block";
      startBtn.textContent = "Play Again";

      const settings = levels[currentLevel];

      let prize = "";
      if (score >= 14) {
        prize = "Golden Patience Firefly Badge!";
      } else if (score >= 9) {
        prize = "Glowing Firefly Jar!";
      } else if (score >= 5) {
        prize = "Tiny Firefly Friend!";
      } else {
        prize = "Barnaby’s Practice Star!";
      }

      message.textContent = "Great job! You practiced waiting for the right moment.";
      prizeDisplay.textContent = "You earned: " + prize;
      quoteDisplay.textContent = getFaithQuote();

      saveScore(score, settings.label);
      showLeaderboard();
    }

    function getPraise() {
      const praise = [
        "Wonderful patience!",
        "You waited for the right moment!",
        "That was gentle and careful!",
        "Great watching!",
        "Barnaby is proud of your patience!"
      ];
      return praise[Math.floor(Math.random() * praise.length)];
    }

    function getFaithQuote() {
      const quotes = [
        "God helps patient hearts grow strong.",
        "Good things can bloom when we wait with care.",
        "Patience is a quiet way to trust God.",
        "A gentle heart waits, watches, and learns.",
        "God’s timing is full of goodness."
      ];
      return quotes[Math.floor(Math.random() * quotes.length)];
    }

    function saveScore(score, level) {
      let scores = JSON.parse(localStorage.getItem("fireflyScores")) || [];

      scores.push({
        score: score,
        level: level,
        date: new Date().toLocaleDateString()
      });

      scores.sort((a, b) => b.score - a.score);
      scores = scores.slice(0, 5);

      localStorage.setItem("fireflyScores", JSON.stringify(scores));
    }

    function showLeaderboard() {
      let scores = JSON.parse(localStorage.getItem("fireflyScores")) || [];

      if (scores.length === 0) {
        leaderboard.innerHTML = "Top Scores will appear here.";
        return;
      }

      leaderboard.innerHTML = "<strong>Top Firefly Scores</strong><br>" +
        scores.map((s, i) => `${i + 1}. ${s.score} fireflies — ${s.level}`).join("<br>");
    }

    function startGentleMusic() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (musicTimer) return;

      const notes = [392, 440, 494, 523, 494, 440, 392, 349];
      let i = 0;

      musicTimer = setInterval(() => {
        if (!gameRunning) return;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.frequency.value = notes[i % notes.length];
        osc.type = "sine";

        gain.gain.setValueAtTime(0.018, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.1);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 1.1);

        i++;
      }, 900);
    }

    function playDing() {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.frequency.value = 880;
      osc.type = "sine";

      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }

    function playSoftOops() {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.frequency.value = 220;
      osc.type = "sine";

      gain.gain.setValueAtTime(0.035, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.35);
    }

    showLeaderboard();
    chooseLevel("easy");
  </script>
</body>
</html>
